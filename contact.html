             <h1>Contact Me</h1>  
        </header>
        <section>
            <p>If you’d like to reach out, please fill out the form below:</p>
            <form action="">
                <!-- Name -->
                 <label for="name">Full Name:</label><br>
                 <input type="text" id="name" name="name" placeholder="Your Full Name" required><br><br>

                <!-- Age -->
                 <label for="age">Age:</label><br>
                 <input type="number" id="age" name="age"><br><br>
                 
                <!-- Gender -->
                 <p>Gender:</p>
                 <input type="radio" id="male" name="gender">
                 <label for="male">Male</label>

                 <input type="radio" id="female" name="gender">
                 <label for="female">Female</label><br><br>

                <!-- Subscribe -->
                 <input type="checkbox" id="subscribe">
                 <label for="subscribe">Join My telegram channel</label><br><br>

                <!-- Satisfaction -->
                 <label for="satisfaction">How satisfied are you?</label><br>
                 <input type="range" id="satisfaction" name="satisfaction" min="1" max="10"><br><br>

                <!-- Buttons -->
                 <button type="submit">Send</button>
                 <button type="reset">Clear</button>
            </form>
        </section>
